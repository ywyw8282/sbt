<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>메카니컬 트리거</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=Bebas+Neue&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  
<header>
  <div class="logo" onclick="showPage('search')">설비트리거<span style="display:block;font-size:9px;font-weight:400;letter-spacing:2px;color:#9C9A92;font-family:'Noto Sans KR',sans-serif;text-transform:uppercase">Mechanical Trigger</span></div>
  <nav>
    <a id="nav-search" class="active" onclick="showPage('search')">자재 검색</a>
    <div class="comm-dropdown" id="commDropdown" onmouseenter="openCommDropdown()" onmouseleave="scheduleCloseCommDropdown()">
      <a id="nav-community" onclick="showPage('community')">커뮤니티</a>
      <div class="comm-dropdown-menu" id="commDropdownMenu" onmouseenter="cancelCloseCommDropdown()" onmouseleave="scheduleCloseCommDropdown()">
        <div class="dmenu-inner">
          <a onclick="showPage('community');switchCommTab('all');closeCommDropdown()">📋 전체</a>
          <a onclick="showPage('community');switchCommTab('best');closeCommDropdown()">🏆 베스트</a>
          <div class="dmenu-divider"></div>
          <a onclick="showPage('community');switchCommTab('free');closeCommDropdown()">💬 자유</a>
          <a onclick="showPage('community');switchCommTab('qna');closeCommDropdown()">❓ 질문</a>
          <a onclick="showPage('community');switchCommTab('info');closeCommDropdown()">📌 정보</a>
        </div>
      </div>
    </div>
    <a id="nav-job" onclick="showPage('job')">구인구직</a>
    <a id="nav-company" onclick="showPage('company')">업체 정보</a>
    <a id="nav-news" onclick="showPage('news')">건설뉴스</a>
    <a id="nav-safety" onclick="showPage('safety')">건설안전</a>
    <a id="nav-notice" onclick="showPage('notice')">공지사항</a>
    <a id="nav-docs" onclick="showPage('docs')" style="color:#A8C4FF">공무자료실</a>
    <a id="nav-help" onclick="showPage('help')" style="color:#FFB347;font-weight:600">🔧 도움요청</a>
    <a id="nav-board" onclick="showPage('board')" style="color:#FFB347;font-weight:500">동산보드</a>
    <a id="nav-matlist" onclick="showPage('matlist')" style="color:#A8C4FF;font-weight:500">📖 자재·용어집</a>
  </nav>
  <div class="header-right" id="headerRight">
    <button class="btn-login" onclick="openLoginModal()">로그인</button>
    <button class="btn-join" onclick="openJoinModal()">회원가입</button>
  </div>
  <div id="msgBellWrap" style="display:none;position:relative;margin-left:4px">
    <button onclick="openMsgModal()" style="padding:6px 10px;background:transparent;border:1px solid var(--border);border-radius:4px;font-size:13px;cursor:pointer;color:var(--text-mid)">📬</button>
    <span id="msgBadge" style="display:none;position:absolute;top:-4px;right:-4px;background:var(--orange);color:#fff;font-size:10px;font-weight:700;padding:1px 5px;border-radius:10px;min-width:16px;text-align:center"></span>
  </div>
</header>
